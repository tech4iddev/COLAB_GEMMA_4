<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 | Structural Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06090f;
            --glass: rgba(255, 255, 255, 0.03);
            --accent: #2563eb;
            --text: #f1f5f9;
            --bot-bg: rgba(30, 41, 59, 0.5);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(37, 99, 235, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 95% 95%, rgba(37, 99, 235, 0.1) 0%, transparent 30%);
        }

        header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(6, 9, 15, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        h1 { margin: 0; font-weight: 600; letter-spacing: -1px; font-size: 1.8rem; background: linear-gradient(to right, #60a5fa, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 0.8rem; color: #64748b; margin-top: 0.3rem; text-transform: uppercase; letter-spacing: 2px; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            max-width: 85%;
            padding: 1.2rem 1.6rem;
            border-radius: 24px;
            line-height: 1.7;
            font-size: 1.05rem;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }

        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .bot { align-self: flex-start; background: var(--bot-bg); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

        pre { background: #000; padding: 1rem; border-radius: 12px; overflow-x: auto; margin: 10px 0; border: 1px solid #334155; }
        code { font-family: 'Fira Code', monospace; font-size: 0.9rem; color: #94a3b8; }

        .input-area {
            padding: 2rem;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
        }

        .input-wrapper {
            max-width: 850px;
            margin: 0 auto;
            background: rgba(255,255,255,0.02);
            padding: 0.6rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 0.8rem;
            backdrop-filter: blur(20px);
            transition: border 0.3s;
        }

        .input-wrapper:focus-within { border-color: var(--accent); }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 1.8rem;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, filter 0.2s;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:active { transform: translateY(0); }
        button:disabled { background: #334155; cursor: not-allowed; }

        #loading { font-size: 0.85rem; color: #60a5fa; text-align: center; margin-bottom: 0.8rem; display: none; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>GEMMA 4 <span style="font-weight: 300; opacity: 0.7;">STRUCTURAL</span></h1>
        <div class="subtitle">SNI 1729:2020 • OpenSeesPy • Structural FEM</div>
    </header>

    <div id="chat-container">
        <div class="message bot">Sistem Aktif. Selamat datang, Engineer Imam. Model Gemma 4 telah di-tune dengan parameter struktur Anda. Apa yang ingin dianalisis kali ini?</div>
    </div>

    <div class="input-area">
        <div id="loading">⚡ Gemma is analyzing structural parameters...</div>
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Tanyakan soal SNI Baja atau Minta script OpenSeesPy..." autocomplete="off">
            <button id="sendBtn">ANALYSIS</button>
            <button id="stopBtn" style="display: none; background: #ef4444; color: white;">STOP</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        const loading = document.getElementById('loading');

        let abortController = null;

        async function processChat() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add User Message
            appendMessage(text, 'user');
            userInput.value = '';
            
            // UI State
            sendBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            loading.style.display = 'block';

            // Create placeholder for bot response
            const botDiv = document.createElement('div');
            botDiv.className = 'message bot';
            chatContainer.appendChild(botDiv);
            
            abortController = new AbortController();

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text }),
                    signal: abortController.signal
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    fullText += chunk;
                    
                    // Live formatting
                    formatBotResponse(botDiv, fullText);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

            } catch (err) {
                if (err.name === 'AbortError') {
                    botDiv.innerHTML += `<br><i style="color: #64748b;">[Analisis dihentikan oleh user]</i>`;
                } else {
                    botDiv.innerHTML = "Galat: Gagal menyambung ke Mac M4. Pastikan 'python app.py' jalan.";
                }
            } finally {
                sendBtn.style.display = 'block';
                stopBtn.style.display = 'none';
                loading.style.display = 'none';
                chatContainer.scrollTop = chatContainer.scrollHeight;
                abortController = null;
            }
        }

        function formatBotResponse(div, text) {
            if (text.includes('```')) {
                const parts = text.split('```');
                let html = '';
                parts.forEach((part, i) => {
                    if (i % 2 === 1) {
                        html += `<pre><code>${part}</code></pre>`;
                    } else {
                        html += `<span>${part.replace(/\n/g, '<br>')}</span>`;
                    }
                });
                div.innerHTML = html;
            } else {
                div.innerHTML = text.replace(/\n/g, '<br>');
            }
        }

        function appendMessage(text, side) {
            const div = document.createElement('div');
            div.className = `message ${side}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', processChat);
        stopBtn.addEventListener('click', () => {
            if (abortController) abortController.abort();
        });
        userInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') processChat(); 
        });
    </script>
</body>
</html>
