<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structural AI Assistant | Premium Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #f1f2f6;
            --accent-primary: #ea4c89; /* Dribbble Pink */
            --accent-secondary: #ff8ab3;
            --surface: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --user-bubble: #ea4c89;
            --ai-bubble: #ffffff;
        }

        /* Markdown & Table Dribbble Style */
        .message table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 16px 0;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #f1f2f6;
        }
        .message th, .message td {
            padding: 14px 18px;
            border-bottom: 1px solid #f1f2f6;
            text-align: left;
        }
        .message th {
            background: #fdf2f7;
            color: var(--accent-primary);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .message pre {
            background: #1e1e2e;
            padding: 20px;
            border-radius: 16px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
            margin: 16px 0;
        }
        .message code {
            color: #ffca28;
            font-size: 0.9rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(234, 76, 137, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(234, 76, 137, 0.05) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 92%;
            max-width: 1000px;
            height: 85vh;
            background: var(--surface);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.1);
            border: 8px solid #ffffff;
            overflow: hidden;
            position: relative;
        }

        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo-area h1 {
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
        }

        .logo-area span {
            color: var(--accent-primary);
        }

        .status-badge {
            background: #fdf2f7;
            color: var(--accent-primary);
            padding: 8px 18px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        #chat-window {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
            background: #fafafa;
        }

        .message {
            max-width: 75%;
            padding: 22px 28px;
            border-radius: 30px;
            font-size: 1.05rem;
            line-height: 1.6;
            position: relative;
            transition: 0.3s;
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: 0 15px 30px -10px rgba(234, 76, 137, 0.4);
        }

        .ai-message {
            align-self: flex-start;
            background: white;
            color: var(--text-main);
            border-bottom-left-radius: 5px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f2f6;
        }

        .input-area {
            padding: 40px 60px;
            background: white;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            background: #f1f2f6;
            border: 2px solid transparent;
            padding: 20px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #user-input:focus {
            background: white;
            border-color: #fdf2f7;
            box-shadow: 0 10px 20px -5px rgba(234, 76, 137, 0.1);
        }

        button {
            height: 60px;
            padding: 0 35px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        #send-btn {
            background: var(--text-main);
            color: white;
        }

        #send-btn:hover {
            transform: translateY(-5px);
            background: #000;
            box-shadow: 0 15px 25px -10px rgba(0, 0, 0, 0.2);
        }

        #stop-btn {
            background: #fff;
            color: #ff4757;
            border: 2px solid #ff4757;
        }

        #stop-btn:hover {
            background: #ff4757;
            color: white;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
            box-shadow: 0 6px 20px 0 rgba(14, 165, 233, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <h1>STRUCTURAL<span>.AI</span></h1>
            </div>
            <div class="status-badge">M4 Optimized (Gemma 4)</div>
            <button onclick="clearChat()" style="height:auto; padding: 10px 15px; font-size: 0.7rem; background: #f1f2f6; color: #636e72;">Clear Chat</button>
        </header>

        <div id="chat-window">
            <div class="message ai-message">
                Halo! Saya asisten teknik sipil Anda. Saya memiliki memori kontekstual sekarang. Ada yang bisa saya bantu dalam proyek Anda?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Tanyakan tentang SNI, hitungan balok, atau kode OpenSeesPy..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Kirim</button>
            <button id="stop-btn" onclick="stopResponse()" style="display: none; background: #fff; color: #ff4757; border: 2px solid #ff4757;">Stop</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const stopBtn = document.getElementById('stop-btn');
        
        let chatHistory = []; // ARRAY UNTUK MEMORI
        let currentAbortController = null;

        function clearChat() {
            chatHistory = [];
            chatWindow.innerHTML = '<div class="message ai-message">Memori telah dihapus. Ada yang ingin Anda tanyakan kembali?</div>';
        }

        function stopResponse() {
            if (currentAbortController) {
                currentAbortController.abort();
                currentAbortController = null;
                stopBtn.style.display = 'none';
                sendBtn.style.display = 'block';
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Tambahkan ke history
            chatHistory.push({ role: 'user', content: text });

            // Setup AbortController
            currentAbortController = new AbortController();
            const signal = currentAbortController.signal;

            // UI Changes
            addMessage(text, 'user');
            userInput.value = '';
            sendBtn.style.display = 'none';
            stopBtn.style.display = 'block';

            const loadingId = 'ai-' + Date.now();
            addMessage('', 'ai', loadingId);
            const aiBubble = document.getElementById(loadingId);
            aiBubble.classList.add('typing');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chatHistory }), // KIRIM SEMUA HISTORY
                    signal: signal
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    fullText += chunk;
                    
                    aiBubble.innerHTML = marked.parse(fullText);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }

                // Tambahkan jawaban AI ke history
                chatHistory.push({ role: 'model', content: fullText });

            } catch (error) {
                if (error.name === 'AbortError') {
                    aiBubble.innerHTML += "<br><i>[Generasi dihentikan oleh pengguna]</i>";
                } else {
                    aiBubble.innerText = "❌ Koneksi terputus.";
                }
            } finally {
                stopBtn.style.display = 'none';
                sendBtn.style.display = 'block';
                currentAbortController = null;
                aiBubble.classList.remove('typing');
            }
        }

        function addMessage(text, sender, id = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-message`;
            if(id) msgDiv.id = id;
            msgDiv.innerText = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
